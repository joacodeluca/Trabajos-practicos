services:
  php:
    build: .
    container_name: php-fpm_UTN
    volumes:
      - ./:/var/www/html

  nginx:
    image: nginx:1.24
    container_name: nginx_UTN
    ports:
      - "8000:80"
    volumes:
      - ./configNginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
    depends_on:
      - php
      - db

  db:
    image: mysql:8.0
    container_name: db_UTN
    environment:
      MYSQL_ROOT_PASSWORD: abcde1234
      MYSQL_DATABASE: datos
      MYSQL_USER: usuario
      MYSQL_PASSWORD: abcde5678
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_UTN
    environment:
      PMA_HOST: db_UTN
      PMA_USER: root
      PMA_PASSWORD: abcde1234
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  mysql_data: